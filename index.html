<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookVibe 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Pretendard", "system-ui", "sans-serif"] },
            colors: {
              ddg: "#0c1f18",
              "ddg-mid": "#153528",
              "ddg-soft": "#1e4636",
              gold: "#c4a35a",
              "gold-bright": "#d4b76a",
              page: "#f3f0e8",
              mist: "#e8e5dd",
            },
            maxWidth: { content: "1200px" },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: Pretendard, system-ui, sans-serif;
        background: #f3f0e8;
        color: #0c1f18;
      }
      .cover-23 {
        aspect-ratio: 2 / 3;
        border-radius: 0.5rem;
        overflow: hidden;
        background: linear-gradient(165deg, #e4e1d9 0%, #d8d5cd 100%);
        box-shadow: 0 4px 6px -1px rgba(12, 31, 24, 0.12), 0 14px 28px -6px rgba(12, 31, 24, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        transition: transform 0.35s ease, box-shadow 0.35s ease;
      }
      .cover-23:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px -2px rgba(12, 31, 24, 0.15), 0 20px 36px -8px rgba(12, 31, 24, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
      .cover-23 img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .status-pill {
        transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease;
      }
      .progress-fill {
        transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .modal-backdrop {
        background: rgba(12, 31, 24, 0.5);
        backdrop-filter: blur(6px);
      }
      .field {
        width: 100%;
        border-radius: 0.5rem;
        border: 1px solid rgba(12, 31, 24, 0.1);
        background: #fff;
        padding: 0.625rem 0.75rem;
        font-size: 0.875rem;
        color: #0c1f18;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .field:focus {
        border-color: rgba(196, 163, 90, 0.55);
        box-shadow: 0 0 0 2px rgba(196, 163, 90, 0.2);
      }
      .btn-primary {
        border-radius: 0.5rem;
        background: #0c1f18;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #f3f0e8;
        transition: background 0.2s ease;
      }
      .btn-primary:hover {
        background: #153528;
      }
      .btn-ghost {
        border-radius: 0.5rem;
        border: 1px solid rgba(12, 31, 24, 0.12);
        background: #fff;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        color: #0c1f18;
        transition: background 0.2s ease;
      }
      .btn-ghost:hover {
        background: rgba(232, 229, 221, 0.8);
      }
      #confetti-canvas {
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 100;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(12, 31, 24, 0.2) transparent;
      }
    </style>
    <script>
      const ACCESS_PASSWORD = "대출기록증";

      function checkAccess() {
        const savedAuth = sessionStorage.getItem("isAuthorized");

        if (savedAuth !== "true") {
          const userInput = prompt("독서 클럽 비밀번호를 입력해주세요:");

          if (userInput === ACCESS_PASSWORD) {
            sessionStorage.setItem("isAuthorized", "true");
            document.body.style.display = "block";
          } else {
            alert("비밀번호가 틀렸습니다. 접근 권한이 없습니다.");
            document.body.innerHTML = "<h1>접근 권한이 없습니다.</h1>";
            window.location.reload();
          }
        } else {
          document.body.style.display = "block";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.body.style.display = "none";
        checkAccess();
      });
    </script>
  </head>
  <body class="min-h-screen antialiased text-ddg" style="display: none">
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>
    <div id="app-root"></div>
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      /** Supabase — Settings → API 에서 anon(JWT) 키를 써도 됩니다. publishable 키가 동작하지 않으면 JWT로 바꾸세요. */
      const SUPABASE_URL = "https://gmhnnahtfjcgnbeyzctq.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_fQ0No6cq6837PG0xo3SaSA_0x7R1nJI";

      const CLUB_MEMBERS = [
        { id: "chad", name: "Chad" },
        { id: "chloe", name: "Chloe" },
        { id: "jeongeun", name: "정은" },
      ];
      const IMG_MAX = 900;
      const JPEG_Q = 0.82;
      const PAST_MAX = 2;

      const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let cache = null;
      let loadError = null;
      let rtChannel = null;
      let debounceTimer = null;

      function uid() {
        return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
      }

      function emptyQuarter() {
        const o = {};
        CLUB_MEMBERS.forEach((m) => {
          o[m.id] = "";
        });
        return o;
      }

      function emptyMilestonesPayload() {
        return { "1": emptyQuarter(), "2": emptyQuarter(), "3": emptyQuarter(), "4": emptyQuarter() };
      }

      function normQuarter(q) {
        if (!q || typeof q !== "object" || Array.isArray(q)) return emptyQuarter();
        const o = emptyQuarter();
        CLUB_MEMBERS.forEach((m) => {
          o[m.id] = typeof q[m.id] === "string" ? q[m.id] : "";
        });
        if (typeof q.chlod === "string" && q.chlod.trim() && !(o.chloe || "").trim()) {
          o.chloe = q.chlod;
        }
        return o;
      }

      function bookIdSortIndex(id) {
        const m = /^b(\d+)$/i.exec(String(id || ""));
        return m ? parseInt(m[1], 10) : 1e9;
      }

      function sortBooksRows(rows) {
        return (rows || []).slice().sort((a, b) => bookIdSortIndex(a.id) - bookIdSortIndex(b.id));
      }

      function extractMilestones(raw) {
        raw = raw || {};
        const o = {};
        for (let q = 1; q <= 4; q++) {
          const seg = raw[q] ?? raw[String(q)];
          o[q] = normQuarter(seg);
        }
        return o;
      }

      function normalizeBook(b, i) {
        return {
          id: b.id || "b" + (i + 1),
          title: b.title || "2026 독서 " + (i + 1),
          author: b.author || "",
          coverUrl: b.coverUrl ?? b.cover_url ?? null,
          pastImport: !!(b.pastImport ?? b.past_import),
          milestones: extractMilestones(b.milestones || {}),
          finalSentence: b.finalSentence ?? b.final_sentence ?? null,
          finalAt: b.finalAt ?? b.final_at ?? null,
        };
      }

      function bookToRow(b) {
        return {
          id: b.id,
          title: b.title,
          author: b.author || "",
          cover_url: b.coverUrl || null,
          past_import: !!b.pastImport,
          milestones: b.milestones,
          final_sentence: b.finalSentence,
          final_at: b.finalAt,
          updated_at: new Date().toISOString(),
        };
      }

      function quarterAllFilled(mq) {
        if (!mq) return false;
        return CLUB_MEMBERS.every((m) => (mq[m.id] || "").trim().length > 0);
      }

      function anySentenceStarted(book) {
        for (let q = 1; q <= 4; q++) {
          const mq = book.milestones[q];
          if (!mq) continue;
          for (const m of CLUB_MEMBERS) {
            if ((mq[m.id] || "").trim()) return true;
          }
        }
        return false;
      }

      function allQuartersComplete(book) {
        return [1, 2, 3, 4].every((q) => quarterAllFilled(book.milestones[q]));
      }

      function bookStatus(book) {
        if (book.pastImport && (book.finalSentence || "").trim()) return "기록 완료";
        if (book.pastImport) return "대기";
        const fin = (book.finalSentence || "").trim();
        if (allQuartersComplete(book) && fin) return "기록 완료";
        if (anySentenceStarted(book)) return "문장 수집 중";
        return "대기";
      }

      function completedCount(data) {
        return data.books.filter((b) => bookStatus(b) === "기록 완료").length;
      }

      function pastSlotsUsed(data) {
        return data.books.filter((b) => b.pastImport).length;
      }

      function eligiblePast(data) {
        return data.books.filter((b) => !b.pastImport && !anySentenceStarted(b));
      }

      function maybeCelebrate(oldS, newS) {
        if (oldS !== "기록 완료" && newS === "기록 완료") fireConfetti();
      }

      function $(sel, root) {
        return (root || document).querySelector(sel);
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function compressImageFile(file) {
        return new Promise((resolve) => {
          if (!file.type.match(/^image\//)) {
            resolve(null);
            return;
          }
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(url);
            const sc = IMG_MAX / Math.max(img.width, img.height);
            const s = sc >= 1 ? 1 : sc;
            const cw = Math.round(img.width * s),
              ch = Math.round(img.height * s);
            const c = document.createElement("canvas");
            c.width = cw;
            c.height = ch;
            c.getContext("2d").drawImage(img, 0, 0, cw, ch);
            try {
              resolve(c.toDataURL("image/jpeg", JPEG_Q));
            } catch {
              resolve(null);
            }
          };
          img.onerror = () => {
            URL.revokeObjectURL(url);
            resolve(null);
          };
          img.src = url;
        });
      }

      async function readCoverFromForm(form, book) {
        const fi = form.elements.namedItem("coverFile");
        const ui = form.elements.namedItem("coverUrl");
        const urlStr = ui && ui.value ? ui.value.trim() : "";
        if (fi && fi.files && fi.files[0]) {
          const d = await compressImageFile(fi.files[0]);
          if (d) book.coverUrl = d;
          else if (urlStr) book.coverUrl = urlStr;
        } else if (urlStr) book.coverUrl = urlStr;
      }

      function meetingsForBook(data, bookId) {
        return data.meetingRecords.filter((m) => m.bookId === bookId);
      }

      function sortedMeetings(data) {
        return data.meetingRecords.slice().sort((a, b) => ((a.date || "") + (a.createdAt || "")).localeCompare((b.date || "") + (b.createdAt || "")));
      }

      function statusClass(st) {
        if (st === "기록 완료") return "border-gold/40 bg-ddg text-page";
        if (st === "문장 수집 중") return "border-ddg/15 bg-ddg-soft/15 text-ddg";
        return "border-ddg/10 bg-mist/60 text-ddg/55";
      }

      function coverHtml(book) {
        if (book.coverUrl) {
          return `<div class="cover-23"><img src="${escapeHtml(book.coverUrl)}" alt="" loading="lazy" /></div>`;
        }
        return `<div class="cover-23 flex items-center justify-center px-4 text-center"><span class="text-sm font-semibold leading-snug text-ddg/40">${escapeHtml(book.title)}</span></div>`;
      }

      function fireConfetti() {
        const canvas = document.getElementById("confetti-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = (canvas.width = window.innerWidth);
        const h = (canvas.height = window.innerHeight);
        const pieces = [];
        for (let i = 0; i < 48; i++) {
          pieces.push({
            x: Math.random() * w,
            y: -20 - Math.random() * 80,
            r: 3 + Math.random() * 5,
            vy: 2 + Math.random() * 4,
            vx: (Math.random() - 0.5) * 2,
            rot: Math.random() * 6,
            vr: (Math.random() - 0.5) * 0.15,
            c: ["#c4a35a", "#153528", "#d4b76a", "#0c1f18"][Math.floor(Math.random() * 4)],
          });
        }
        const t0 = Date.now();
        function frame() {
          const elapsed = Date.now() - t0;
          ctx.clearRect(0, 0, w, h);
          pieces.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.c;
            ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
            ctx.restore();
          });
          if (elapsed < 2200) requestAnimationFrame(frame);
          else ctx.clearRect(0, 0, w, h);
        }
        frame();
      }

      function parseRoute() {
        const h = (location.hash || "").replace(/^#\/?/, "");
        if (h.indexOf("meetings") === 0) return { main: "meetings", overlay: null };
        if (h.indexOf("recap") === 0) return { main: "recap", overlay: null };
        if (h.indexOf("modal/past") === 0) return { main: "feed", overlay: "past" };
        const m = h.match(/^book\/([^/]+)/);
        if (m) return { main: "feed", overlay: "book:" + m[1] };
        return { main: "feed", overlay: null };
      }

      function goHash(h) {
        location.hash = h;
      }

      async function persistBook(book) {
        const { error } = await sb.from("books").upsert(bookToRow(book), { onConflict: "id" });
        if (error) throw error;
      }

      async function refreshFromDb() {
        const { data: rows, error: e1 } = await sb.from("books").select("*");
        if (e1) throw e1;
        const bookRows = sortBooksRows(rows);
        const { data: mrows, error: e2 } = await sb.from("meetings").select("*").order("created_at", { ascending: true });
        if (e2) throw e2;
        if (!bookRows || bookRows.length === 0) {
          const batch = [];
          for (let i = 1; i <= 10; i++) {
            batch.push({
              id: "b" + i,
              title: "2026 독서 " + i,
              author: "",
              past_import: false,
              milestones: emptyMilestonesPayload(),
              cover_url: null,
              final_sentence: null,
              final_at: null,
            });
          }
          const { error: e3 } = await sb.from("books").insert(batch);
          if (e3 && !String(e3.message || "").includes("duplicate")) throw e3;
          return refreshFromDb();
        }
        cache = {
          books: bookRows.map((r, i) =>
            normalizeBook(
              {
                id: r.id,
                title: r.title,
                author: r.author,
                cover_url: r.cover_url,
                past_import: r.past_import,
                milestones: r.milestones,
                final_sentence: r.final_sentence,
                final_at: r.final_at,
              },
              i
            )
          ),
          meetingRecords: (mrows || []).map((r) => ({
            id: r.id,
            bookId: r.book_id,
            date: r.meeting_date,
            place: r.place,
            photos: Array.isArray(r.photos) ? r.photos : [],
            createdAt: r.created_at,
          })),
        };
        loadError = null;
      }

      function scheduleRefresh() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
          try {
            await refreshFromDb();
            renderApp();
          } catch (e) {
            console.error(e);
            loadError = e.message || String(e);
            renderApp();
          }
        }, 140);
      }

      function subscribeRealtime() {
        if (rtChannel) {
          sb.removeChannel(rtChannel);
          rtChannel = null;
        }
        rtChannel = sb
          .channel("bookvibe-public")
          .on("postgres_changes", { event: "*", schema: "public", table: "books" }, scheduleRefresh)
          .on("postgres_changes", { event: "*", schema: "public", table: "meetings" }, scheduleRefresh)
          .subscribe();
      }

      function renderTop(data) {
        const done = completedCount(data);
        const pct = Math.round((done / 10) * 100);
        const err = loadError ? `<p class="mt-2 text-xs text-red-700">연결 오류: ${escapeHtml(loadError)}</p>` : "";
        const sync = loadError ? "" : `<p id="sync-pill" class="mt-2 text-[10px] text-ddg/40">실시간 동기화 · Supabase</p>`;
        return `<header class="sticky top-0 z-30 border-b border-ddg/8 bg-page/95 backdrop-blur-md"><div class="mx-auto max-w-content px-4 pb-5 pt-6 md:px-6"><div class="flex flex-col gap-1 md:flex-row md:items-end md:justify-between"><div><p class="text-[10px] font-semibold uppercase tracking-[0.22em] text-gold/90">Reading Club</p><h1 class="mt-1 text-2xl font-bold tracking-tight text-ddg md:text-3xl">BookVibe 2026</h1></div><p class="text-sm text-ddg/50">10권 · 3인 · DB 실시간</p></div>${sync}${err}<div class="mt-5"><div class="mb-2 flex justify-between text-xs font-medium text-ddg/55"><span>기록 완료</span><span class="tabular-nums text-ddg">${done} / 10</span></div><div class="h-2 overflow-hidden rounded-full bg-mist"><div class="progress-fill h-full rounded-full bg-gradient-to-r from-ddg-mid to-ddg" style="width:${pct}%"></div></div></div></div></header>`;
      }

      function renderFeed(data) {
        const cards = data.books
          .map((b) => {
            const st = bookStatus(b);
            return `<a href="#/book/${b.id}" class="group block">${coverHtml(b)}<div class="mt-3 flex items-start justify-between gap-2 px-0.5"><div class="min-w-0 flex-1"><p class="truncate text-base font-semibold text-ddg group-hover:text-ddg-mid">${escapeHtml(b.title)}</p><p class="mt-0.5 truncate text-sm text-ddg/45">${b.author ? escapeHtml(b.author) : "\u00a0"}</p></div><span class="status-pill shrink-0 rounded-full border px-2.5 py-1 text-[10px] font-semibold ${statusClass(st)}">${st}</span></div></a>`;
          })
          .join("");
        return `<main class="mx-auto max-w-content px-4 py-8 pb-32 md:px-6"><div class="grid grid-cols-1 gap-10 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 md:gap-8">${cards}</div></main>`;
      }

      function renderMeetings(data) {
        const list = sortedMeetings(data);
        const titleOf = (id) => data.books.find((x) => x.id === id)?.title || "—";
        const body = list.length
          ? list
              .map((rec) => {
                const ph = (rec.photos || [])
                  .map(
                    (src) =>
                      `<div class="aspect-square overflow-hidden rounded-lg border border-ddg/8 bg-mist"><img src="${escapeHtml(src)}" class="h-full w-full object-cover" alt="" loading="lazy" /></div>`
                  )
                  .join("");
                return `<article class="border-b border-ddg/8 py-10 last:border-0"><p class="text-xs font-medium text-ddg/40">${escapeHtml(rec.date || "")}</p><h2 class="mt-1 text-lg font-bold text-ddg">${escapeHtml(titleOf(rec.bookId))}</h2><p class="mt-1 text-sm text-ddg/55">📍 ${escapeHtml(rec.place || "")}</p><div class="mt-5 grid grid-cols-3 gap-2 sm:grid-cols-4 md:grid-cols-5">${ph}</div></article>`;
              })
              .join("")
          : `<p class="py-20 text-center text-sm text-ddg/45">모임 기록이 없습니다.</p>`;
        return `<main class="mx-auto max-w-content px-4 py-8 pb-32 md:px-6"><a href="#/" class="mb-8 inline-block text-sm text-ddg/45 hover:text-ddg">← 피드</a><h2 class="text-xl font-bold text-ddg md:text-2xl">Meeting History</h2><p class="mt-1 text-sm text-ddg/50">날짜 순</p><div class="mt-10">${body}</div></main>`;
      }

      function renderRecap(data) {
        const rows = data.books
          .map((b, i) => {
            const q = b.finalSentence ? `「${escapeHtml(b.finalSentence)}」` : `<span class="text-ddg/30">—</span>`;
            const inner = b.coverUrl
              ? `<img src="${escapeHtml(b.coverUrl)}" class="h-full w-full object-cover" alt="" />`
              : `<div class="flex h-full items-center justify-center px-1 text-center text-[10px] font-medium text-ddg/35">${escapeHtml(b.title.slice(0, 6))}</div>`;
            return `<div class="flex gap-5 border-b border-ddg/8 py-6 last:border-0"><div class="h-24 w-16 shrink-0 md:h-28 md:w-[4.5rem]"><div class="cover-23 h-full">${inner}</div></div><div class="min-w-0 flex-1"><p class="text-[10px] font-semibold text-gold/80">#${i + 1}</p><h3 class="font-semibold text-ddg">${escapeHtml(b.title)}</h3><p class="mt-2 text-sm leading-relaxed text-ddg/65">${q}</p></div></div>`;
          })
          .join("");
        return `<main class="mx-auto max-w-content px-4 py-8 pb-32 md:px-6"><a href="#/" class="mb-8 inline-block text-sm text-ddg/45 hover:text-ddg">← 피드</a><h2 class="text-xl font-bold md:text-2xl">올해의 문장</h2><div class="mt-8 max-w-2xl">${rows}</div></main>`;
      }

      function renderPastModal(data) {
        const used = pastSlotsUsed(data);
        const elig = eligiblePast(data);
        const can = used < PAST_MAX && elig.length > 0;
        const opts = elig.map((b) => `<option value="${b.id}">#${data.books.indexOf(b) + 1} · ${escapeHtml(b.title)}</option>`).join("");
        const form = can
          ? `<form id="form-past" class="space-y-4"><div><label class="text-xs font-medium text-ddg/45">책 칸</label><select name="bookId" required class="field mt-1">${opts}</select></div><div><label class="text-xs font-medium text-ddg/45">제목</label><input name="title" required class="field mt-1" /></div><div><label class="text-xs font-medium text-ddg/45">저자</label><input name="author" class="field mt-1" placeholder="선택" /></div><div><label class="text-xs font-medium text-ddg/45">표지 (파일 / URL)</label><input type="file" name="coverFile" accept="image/*" class="mt-2 block w-full text-xs" /><input type="url" name="coverUrl" class="field mt-2" placeholder="https://…" /></div><div><label class="text-xs font-medium text-ddg/45">최종 문장 1개</label><textarea name="final" required rows="3" class="field mt-1"></textarea></div><button type="submit" class="btn-primary w-full">Fast-track 저장</button></form>`
          : `<p class="text-sm text-ddg/50">추가 불가 (최대 ${PAST_MAX}권 또는 이미 문장이 있는 칸만 있음).</p>`;
        return `<div class="modal-backdrop fixed inset-0 z-50 flex items-end justify-center sm:items-center sm:p-6"><div class="max-h-[92vh] w-full max-w-lg overflow-y-auto rounded-t-2xl bg-page p-6 shadow-2xl sm:rounded-2xl"><div class="mb-4 flex items-center justify-between"><h2 class="text-lg font-bold">과거 기록 (Fast-track)</h2><a href="#/" class="text-sm text-ddg/40 hover:text-ddg">닫기</a></div><p class="mb-4 text-sm leading-relaxed text-ddg/55">정보 + 최종 문장만으로 <strong>기록 완료</strong> 처리합니다.</p><p class="mb-4 text-xs text-ddg/40">${used} / ${PAST_MAX}권</p>${form}</div></div>`;
      }

      function quarterEditors(book, q) {
        const mq = book.milestones[q];
        return CLUB_MEMBERS.map((mem) => {
          const val = escapeHtml((mq[mem.id] || "").replace(/\r/g, ""));
          return `<div class="mt-3"><label class="text-xs font-semibold text-ddg/50">${escapeHtml(mem.name)}</label><textarea name="q${q}_${mem.id}" rows="2" class="field mt-1 resize-y" placeholder="이 구간에서 기억에 남는 문장">${val}</textarea></div>`;
        }).join("");
      }

      function meetingSection(data, book) {
        if (bookStatus(book) !== "기록 완료") return "";
        const ms = meetingsForBook(data, book.id);
        const list = ms
          .map(
            (m) =>
              `<li class="flex items-center justify-between gap-2 rounded-lg border border-ddg/8 bg-mist/40 px-3 py-2 text-xs"><span>${escapeHtml(m.date)} · ${escapeHtml(m.place)}</span><button type="button" class="text-rose-700/90 hover:underline" data-del-meeting="${m.id}">삭제</button></li>`
          )
          .join("");
        return `<section class="mt-8 border-t border-ddg/10 pt-8"><h3 class="text-sm font-bold text-ddg">Meeting History</h3><form id="form-meeting" class="mt-4 grid gap-3 sm:grid-cols-2" data-book="${book.id}"><div><label class="text-xs text-ddg/45">날짜</label><input type="date" name="mdate" required class="field mt-1" /></div><div><label class="text-xs text-ddg/45">장소</label><input name="mplace" required class="field mt-1" placeholder="장소" /></div><div class="sm:col-span-2"><label class="text-xs text-ddg/45">사진 (여러 장)</label><input type="file" name="mphotos" accept="image/*" multiple class="mt-2 block w-full text-xs" /></div><div class="sm:col-span-2"><label class="text-xs text-ddg/45">사진 URL (줄마다)</label><textarea name="murls" rows="2" class="field mt-1"></textarea></div><div class="sm:col-span-2"><button type="submit" class="btn-ghost">기록 추가</button></div></form>${ms.length ? `<ul class="mt-4 space-y-2">${list}</ul>` : ""}</section>`;
      }

      function renderBookModal(data, book) {
        const st = bookStatus(book);
        const metaForm = `<form id="form-meta" class="mt-6 space-y-4" data-book="${book.id}"><div><label class="text-xs font-medium text-ddg/45">제목</label><input name="title" class="field mt-1" value="${escapeHtml(book.title)}" /></div><div><label class="text-xs font-medium text-ddg/45">저자</label><input name="author" class="field mt-1" value="${escapeHtml(book.author)}" placeholder="선택" /></div><div><label class="text-xs font-medium text-ddg/45">표지</label><input type="file" name="coverFile" accept="image/*" class="mt-2 block text-xs" /><input type="url" name="coverUrl" class="field mt-2" placeholder="URL" value="${book.coverUrl && book.coverUrl.indexOf("http") === 0 ? escapeHtml(book.coverUrl) : ""}" /></div><button type="submit" class="btn-primary">정보 저장</button></form>`;

        if (book.pastImport) {
          return `<div class="modal-backdrop fixed inset-0 z-50 flex items-end justify-center sm:items-center sm:p-6"><div class="max-h-[92vh] w-full max-w-lg overflow-y-auto rounded-t-2xl bg-page p-6 sm:max-h-[88vh] sm:rounded-2xl"><div class="sticky top-0 z-10 -mx-6 -mt-6 mb-4 flex items-center justify-between border-b border-ddg/8 bg-page/95 px-6 py-4 backdrop-blur"><a href="#/" class="text-sm text-ddg/45">닫기</a><span class="status-pill rounded-full border px-3 py-1 text-[10px] font-bold ${statusClass(st)}">${st}</span></div><div class="mx-auto max-w-[200px]">${coverHtml(book)}</div>${metaForm}<form id="form-final" class="mt-6 space-y-2" data-book="${book.id}"><label class="text-xs font-medium text-ddg/45">최종 문장</label><textarea name="final" rows="2" class="field mt-1">${escapeHtml((book.finalSentence || "").replace(/\r/g, ""))}</textarea><button type="submit" class="btn-primary w-full">문장 저장</button></form>${meetingSection(data, book)}</div></div>`;
        }

        const quarters = [1, 2, 3, 4]
          .map(
            (q) =>
              `<section class="mt-8 border-t border-ddg/10 pt-8 first:mt-6 first:border-0 first:pt-0"><h3 class="text-xs font-bold uppercase tracking-wider text-gold/90">${q}/4 · 멤버별 문장</h3><form id="form-quarter-${q}" class="mt-3 space-y-1" data-book="${book.id}" data-quarter="${q}">${quarterEditors(book, q)}<button type="submit" class="btn-primary mt-4 w-full sm:w-auto">이 구간 저장</button></form></section>`
          )
          .join("");

        const finalBlock = allQuartersComplete(book)
          ? `<form id="form-final" class="mt-8 space-y-2 border-t border-ddg/10 pt-8" data-book="${book.id}"><label class="text-sm font-bold text-ddg">최종 1문장 확정</label><p class="text-xs text-ddg/45">4/4까지 모두 입력되었습니다.</p><textarea name="final" rows="3" class="field mt-1" placeholder="이 책을 대표하는 한 문장">${escapeHtml((book.finalSentence || "").replace(/\r/g, ""))}</textarea><button type="submit" class="btn-primary">확정 저장</button></form>`
          : `<p class="mt-8 border-t border-ddg/10 pt-8 text-sm text-ddg/45">네 구간 모두 3인 문장이 채워지면 최종 문장을 확정할 수 있습니다.</p>`;

        return `<div class="modal-backdrop fixed inset-0 z-50 flex items-end justify-center sm:items-center sm:p-6"><div class="max-h-[92vh] w-full max-w-lg overflow-y-auto rounded-t-2xl bg-page p-6 sm:max-h-[88vh] sm:rounded-2xl"><div class="sticky top-0 z-10 -mx-6 -mt-6 mb-4 flex items-center justify-between border-b border-ddg/8 bg-page/95 px-6 py-4 backdrop-blur"><a href="#/" class="text-sm text-ddg/45">닫기</a><span class="status-pill rounded-full border px-3 py-1 text-[10px] font-bold ${statusClass(st)}">${st}</span></div><div class="mx-auto max-w-[220px]">${coverHtml(book)}</div>${metaForm}${quarters}${finalBlock}${meetingSection(data, book)}</div></div>`;
      }

      function renderBottomNav(r) {
        const a = "flex flex-1 flex-col items-center justify-center py-3 text-center text-[11px] font-semibold transition ";
        return `<nav class="fixed bottom-0 left-0 right-0 z-40 border-t border-ddg/10 bg-page/95 backdrop-blur-md"><div class="mx-auto flex max-w-content"><a href="#/" class="${a}${r.main === "feed" && !r.overlay ? "text-ddg" : "text-ddg/40 hover:text-ddg/70"}">피드</a><a href="#/modal/past" class="${a}${r.overlay === "past" ? "text-ddg" : "text-ddg/40 hover:text-ddg/70"}">과거 기록</a><a href="#/meetings" class="${a}${r.main === "meetings" ? "text-ddg" : "text-ddg/40 hover:text-ddg/70"}">모임</a><a href="#/recap" class="${a}${r.main === "recap" ? "text-ddg" : "text-ddg/40 hover:text-ddg/70"}">올해의 문장</a></div></nav>`;
      }

      function renderOverlay(data, r) {
        if (r.overlay === "past") return renderPastModal(data);
        if (r.overlay && r.overlay.startsWith("book:")) {
          const id = r.overlay.slice(5);
          const b = data.books.find((x) => x.id === id);
          if (b) return renderBookModal(data, b);
        }
        return "";
      }

      function renderApp() {
        const root = document.getElementById("app-root");
        if (!root) return;
        if (!cache) {
          root.innerHTML = `<div class="flex min-h-screen items-center justify-center text-sm text-ddg/50">불러오는 중…</div>`;
          return;
        }
        const r = parseRoute();
        const main = r.main === "meetings" ? renderMeetings(cache) : r.main === "recap" ? renderRecap(cache) : renderFeed(cache);
        root.innerHTML = `<div class="min-h-screen pb-28">${renderTop(cache)}<div id="main">${main}</div>${renderBottomNav(r)}<div id="overlay-root">${renderOverlay(cache, r)}</div></div>`;
        if (!location.hash || location.hash === "#") {
          if (r.main === "feed" && !r.overlay) history.replaceState(null, "", "#/");
        }
      }

      function bindGlobals() {
        document.addEventListener("click", (e) => {
          const t = e.target;
          if (t.classList && t.classList.contains("modal-backdrop")) goHash("#/");
          const dm = t.closest && t.closest("[data-del-meeting]");
          if (dm) {
            const mid = dm.getAttribute("data-del-meeting");
            (async () => {
              try {
                const { error } = await sb.from("meetings").delete().eq("id", mid);
                if (error) throw error;
                await refreshFromDb();
                renderApp();
              } catch (err) {
                alert(err.message || String(err));
              }
            })();
          }
        });

        document.addEventListener("submit", async (e) => {
          const form = e.target;
          if (form.tagName !== "FORM") return;
          e.preventDefault();
          if (!cache) return;
          const data = cache;

          try {
            if (form.id === "form-past") {
              if (pastSlotsUsed(data) >= PAST_MAX) return;
              const bid = form.elements.namedItem("bookId").value;
              const b = data.books.find((x) => x.id === bid);
              if (!b || b.pastImport || anySentenceStarted(b)) return;
              const oldSt = bookStatus(b);
              b.title = form.elements.namedItem("title").value.trim() || b.title;
              b.author = (form.elements.namedItem("author") && form.elements.namedItem("author").value.trim()) || "";
              const ft = form.elements.namedItem("final").value.trim();
              if (!ft) return;
              b.pastImport = true;
              b.finalSentence = ft;
              b.finalAt = new Date().toISOString();
              await readCoverFromForm(form, b);
              await persistBook(b);
              await refreshFromDb();
              maybeCelebrate(oldSt, bookStatus(b));
              goHash("#/book/" + b.id);
              return;
            }

            if (form.id === "form-meta") {
              const bid2 = form.getAttribute("data-book");
              const b2 = data.books.find((x) => x.id === bid2);
              if (!b2) return;
              const oldSt2 = bookStatus(b2);
              b2.title = form.elements.namedItem("title").value.trim() || b2.title;
              b2.author = (form.elements.namedItem("author") && form.elements.namedItem("author").value.trim()) || "";
              await readCoverFromForm(form, b2);
              await persistBook(b2);
              await refreshFromDb();
              maybeCelebrate(oldSt2, bookStatus(b2));
              renderApp();
              return;
            }

            if (form.id && form.id.startsWith("form-quarter-")) {
              const q = parseInt(form.getAttribute("data-quarter"), 10);
              const bid3 = form.getAttribute("data-book");
              const b3 = data.books.find((x) => x.id === bid3);
              if (!b3 || b3.pastImport || ![1, 2, 3, 4].includes(q)) return;
              const oldSt3 = bookStatus(b3);
              const mq = b3.milestones[q];
              CLUB_MEMBERS.forEach((m) => {
                const el = form.elements.namedItem("q" + q + "_" + m.id);
                mq[m.id] = el && el.value ? el.value : "";
              });
              await persistBook(b3);
              await refreshFromDb();
              maybeCelebrate(oldSt3, bookStatus(b3));
              renderApp();
              return;
            }

            if (form.id === "form-final") {
              const bid4 = form.getAttribute("data-book");
              const b4 = data.books.find((x) => x.id === bid4);
              if (!b4) return;
              if (!b4.pastImport && !allQuartersComplete(b4)) return;
              const oldSt4 = bookStatus(b4);
              b4.finalSentence = form.elements.namedItem("final").value.trim() || null;
              b4.finalAt = b4.finalSentence ? new Date().toISOString() : null;
              await persistBook(b4);
              await refreshFromDb();
              maybeCelebrate(oldSt4, bookStatus(b4));
              renderApp();
              return;
            }

            if (form.id === "form-meeting") {
              const bid5 = form.getAttribute("data-book");
              const b5 = data.books.find((x) => x.id === bid5);
              if (!b5 || bookStatus(b5) !== "기록 완료") return;
              const mdate = form.elements.namedItem("mdate").value;
              const mplace = form.elements.namedItem("mplace").value.trim();
              if (!mdate || !mplace) return;
              const photos = [];
              const ut = (form.elements.namedItem("murls") && form.elements.namedItem("murls").value.trim()) || "";
              if (ut) {
                ut.split(/\n+/).forEach((line) => {
                  const u = line.trim();
                  if (u.indexOf("http") === 0) photos.push(u);
                });
              }
              const addRow = async () => {
                const { error } = await sb.from("meetings").insert({
                  book_id: bid5,
                  meeting_date: mdate,
                  place: mplace,
                  photos,
                });
                if (error) throw error;
                await refreshFromDb();
                renderApp();
              };
              const pi = form.elements.namedItem("mphotos");
              const files = pi && pi.files && pi.files.length ? Array.from(pi.files) : [];
              if (files.length) {
                for (const file of files) {
                  const d = await compressImageFile(file);
                  if (d) photos.push(d);
                }
              }
              await addRow();
            }
          } catch (err) {
            console.error(err);
            alert(err.message || String(err));
          }
        });
      }

      window.addEventListener("hashchange", () => renderApp());
      window.addEventListener("resize", () => {
        const c = document.getElementById("confetti-canvas");
        if (c) {
          c.width = window.innerWidth;
          c.height = window.innerHeight;
        }
      });

      document.addEventListener("DOMContentLoaded", async () => {
        if (sessionStorage.getItem("isAuthorized") !== "true") return;
        try {
          await refreshFromDb();
          subscribeRealtime();
          bindGlobals();
          renderApp();
        } catch (err) {
          loadError = err.message || String(err);
          cache = { books: [], meetingRecords: [] };
          bindGlobals();
          renderApp();
        }
      });
    </script>
  </body>
</html>
