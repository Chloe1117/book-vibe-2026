<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookVibe 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Pretendard", "system-ui", "sans-serif"], serif: ["Georgia", "Times New Roman", "serif"] },
            colors: {
              ddg: "#0c1f18",
              "ddg-mid": "#153528",
              "ddg-soft": "#1e4636",
              gold: "#c4a35a",
              page: "#f3f0e8",
              mist: "#e8e5dd",
              walnut: "#3d281d",
              oak: "#6a4531",
            },
            maxWidth: { content: "1200px" },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: Pretendard, system-ui, sans-serif;
        background: #f3f0e8;
        color: #0c1f18;
      }
      #confetti-canvas {
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 100;
      }
      .cover-23 {
        aspect-ratio: 2 / 3;
        border-radius: 0.55rem;
        overflow: hidden;
        background: linear-gradient(165deg, #e4e1d9 0%, #d8d5cd 100%);
        box-shadow: 0 4px 6px -1px rgba(12, 31, 24, 0.12), 0 14px 28px -6px rgba(12, 31, 24, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
      .status-pill {
        transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease;
      }
      .progress-fill {
        transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .member-dot {
        width: 0.58rem;
        height: 0.58rem;
        border-radius: 999px;
      }
      .track-lane {
        position: relative;
        height: 2.15rem;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(12, 31, 24, 0.05) 0%, rgba(12, 31, 24, 0.12) 100%);
      }
      .track-lane::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 0.75rem;
        right: 0.75rem;
        transform: translateY(-50%);
        border-top: 1px dashed rgba(12, 31, 24, 0.2);
      }
      .runner {
        position: absolute;
        top: 50%;
        width: 1.6rem;
        height: 1.6rem;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
        color: #f3f0e8;
        box-shadow: 0 4px 12px rgba(12, 31, 24, 0.24);
      }
      .wood-bg {
        background: linear-gradient(155deg, #2e1f17 0%, #4a3022 33%, #6a4531 66%, #5a3d2d 100%);
        position: relative;
      }
      .wood-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.04) 2px,
          rgba(0, 0, 0, 0.05) 2px,
          rgba(0, 0, 0, 0.05) 6px
        );
        mix-blend-mode: soft-light;
        pointer-events: none;
      }
      .shelf-row {
        position: relative;
        border-radius: 0.8rem;
        background: rgba(35, 22, 15, 0.6);
        box-shadow: 0 9px 14px rgba(12, 31, 24, 0.28), inset 0 -2px 0 rgba(0, 0, 0, 0.18);
      }
      .book-slot {
        border-radius: 0.55rem;
        overflow: hidden;
        border: 1px solid rgba(212, 183, 106, 0.2);
      }
      .book-empty {
        aspect-ratio: 2 / 3;
        border-radius: 0.55rem;
        border: 1px solid rgba(212, 183, 106, 0.45);
        background: rgba(30, 18, 12, 0.35);
      }
      .modal-backdrop {
        background: rgba(12, 31, 24, 0.55);
        backdrop-filter: blur(6px);
      }
      .paper {
        background: linear-gradient(160deg, #fcf7eb 0%, #f5eddc 100%);
      }
      .field {
        width: 100%;
        border-radius: 0.5rem;
        border: 1px solid rgba(12, 31, 24, 0.1);
        background: #fff;
        padding: 0.625rem 0.75rem;
        font-size: 0.875rem;
        color: #0c1f18;
        outline: none;
      }
      .btn-primary {
        border-radius: 0.5rem;
        background: #0c1f18;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #f3f0e8;
      }
      .btn-ghost {
        border-radius: 0.5rem;
        border: 1px solid rgba(12, 31, 24, 0.12);
        background: #fff;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        color: #0c1f18;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(12, 31, 24, 0.2) transparent;
      }
    </style>
    <script>
      const ACCESS_PASSWORD = "대출기록증";
      function checkAccess() {
        const savedAuth = sessionStorage.getItem("isAuthorized");
        if (savedAuth !== "true") {
          const userInput = prompt("독서 클럽 비밀번호를 입력해주세요:");
          if (userInput === ACCESS_PASSWORD) {
            sessionStorage.setItem("isAuthorized", "true");
            document.body.style.display = "block";
          } else {
            alert("비밀번호가 틀렸습니다. 접근 권한이 없습니다.");
            document.body.innerHTML = "<h1>접근 권한이 없습니다.</h1>";
            window.location.reload();
          }
        } else {
          document.body.style.display = "block";
        }
      }
      document.addEventListener("DOMContentLoaded", () => {
        document.body.style.display = "none";
        checkAccess();
      });
    </script>
  </head>
  <body class="min-h-screen antialiased text-ddg" style="display: none">
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>
    <div id="app-root"></div>
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      const SUPABASE_URL = "https://gmhnnahtfjcgnbeyzctq.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_fQ0No6cq6837PG0xo3SaSA_0x7R1nJI";

      const CLUB_MEMBERS = [
        { id: "chad", name: "Chad", short: "C", color: "#153528" },
        { id: "chloe", name: "Chloe", short: "H", color: "#2b624b" },
        { id: "jeongeun", name: "정은", short: "J", color: "#c4a35a" },
      ];
      const IMG_MAX = 900;
      const JPEG_Q = 0.82;
      const BOOK_TOTAL = 10;

      const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let cache = null;
      let loadError = null;
      let rtChannel = null;
      let debounceTimer = null;
      let isAdminMode = false;

      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function emptyQuarter() {
        const o = {};
        CLUB_MEMBERS.forEach((m) => (o[m.id] = ""));
        return o;
      }
      function normQuarter(q) {
        if (!q || typeof q !== "object" || Array.isArray(q)) return emptyQuarter();
        const o = emptyQuarter();
        CLUB_MEMBERS.forEach((m) => (o[m.id] = typeof q[m.id] === "string" ? q[m.id] : ""));
        if (typeof q.chlod === "string" && q.chlod.trim() && !(o.chloe || "").trim()) o.chloe = q.chlod;
        return o;
      }
      function emptyMilestonesPayload(chapters = 4) {
        const o = {};
        for (let c = 1; c <= Math.max(1, chapters); c++) o[String(c)] = emptyQuarter();
        return o;
      }
      function bookIdSortIndex(id) {
        const m = /^b(\d+)$/i.exec(String(id || ""));
        return m ? parseInt(m[1], 10) : 1e9;
      }
      function sortBooksRows(rows) {
        return (rows || []).slice().sort((a, b) => bookIdSortIndex(a.id) - bookIdSortIndex(b.id));
      }
      function inferChapterCount(rawMilestones) {
        const keys = Object.keys(rawMilestones || {})
          .map((k) => parseInt(k, 10))
          .filter((n) => Number.isFinite(n) && n > 0);
        return keys.length ? Math.max(...keys) : 4;
      }
      function extractMilestones(raw, chapterCount) {
        const o = {};
        for (let c = 1; c <= chapterCount; c++) {
          const seg = (raw || {})[c] ?? (raw || {})[String(c)];
          o[c] = normQuarter(seg);
        }
        return o;
      }
      function chapterKeys(book) {
        const count = Math.max(1, parseInt(book.chapters || 4, 10) || 4);
        return Array.from({ length: count }, (_, i) => i + 1);
      }
      function chapterAllFilled(book, c) {
        const seg = book.milestones[c];
        return !!seg && CLUB_MEMBERS.every((m) => (seg[m.id] || "").trim().length > 0);
      }
      function chapterFilledCount(book) {
        return chapterKeys(book).filter((c) => chapterAllFilled(book, c)).length;
      }
      function anySentenceStarted(book) {
        return chapterKeys(book).some((c) => CLUB_MEMBERS.some((m) => (book.milestones[c]?.[m.id] || "").trim()));
      }
      function allChaptersComplete(book) {
        return chapterKeys(book).every((c) => chapterAllFilled(book, c));
      }
      function memberHasAny(book, memberId) {
        return chapterKeys(book).some((c) => (book.milestones[c]?.[memberId] || "").trim());
      }
      function memberProgress(book, memberId) {
        const total = chapterKeys(book).length;
        if (!total) return 0;
        const done = chapterKeys(book).filter((c) => (book.milestones[c]?.[memberId] || "").trim()).length;
        return Math.round((done / total) * 100);
      }
      function memberStatusText(book) {
        return CLUB_MEMBERS.map((m) => `${m.name} ${memberHasAny(book, m.id) ? "완료" : "대기 중"}`).join(", ");
      }
      function normalizeBook(b, i) {
        const inferred = Math.max(1, parseInt(b.chapters || b.chapter_count || inferChapterCount(b.milestones || {}), 10) || 4);
        return {
          id: b.id || "b" + (i + 1),
          title: b.title || "2026 독서 " + (i + 1),
          author: b.author || "",
          coverUrl: b.coverUrl ?? b.cover_url ?? null,
          chapters: inferred,
          milestones: extractMilestones(b.milestones || {}, inferred),
          finalSentence: b.finalSentence ?? b.final_sentence ?? null,
          finalAt: b.finalAt ?? b.final_at ?? null,
        };
      }
      function bookToRow(b) {
        return {
          id: b.id,
          title: b.title,
          author: b.author || "",
          cover_url: b.coverUrl || null,
          milestones: b.milestones,
          final_sentence: b.finalSentence,
          final_at: b.finalAt,
          updated_at: new Date().toISOString(),
        };
      }
      function bookStatus(book) {
        const fin = (book.finalSentence || "").trim();
        if (allChaptersComplete(book) && fin) return "기록 완료";
        if (anySentenceStarted(book)) return "문장 수집 중";
        return "대기";
      }
      function overallProgress(data) {
        const totals = data.books.reduce(
          (acc, b) => {
            acc.total += chapterKeys(b).length;
            acc.done += chapterFilledCount(b);
            return acc;
          },
          { done: 0, total: 0 }
        );
        const pct = totals.total ? Math.round((totals.done / totals.total) * 100) : 0;
        return { ...totals, pct };
      }
      function currentBook(data) {
        const byOrder = data.books.slice().sort((a, b) => bookIdSortIndex(a.id) - bookIdSortIndex(b.id));
        return byOrder.find((b) => bookStatus(b) === "문장 수집 중") || byOrder.find((b) => bookStatus(b) === "대기") || byOrder[0];
      }
      function statusClass(st) {
        if (st === "기록 완료") return "border-gold/40 bg-ddg text-page";
        if (st === "문장 수집 중") return "border-ddg/15 bg-ddg-soft/15 text-ddg";
        return "border-ddg/10 bg-mist/60 text-ddg/55";
      }
      function coverHtml(book, allowText = true) {
        if (book.coverUrl) return `<div class="cover-23"><img src="${escapeHtml(book.coverUrl)}" alt="" loading="lazy" /></div>`;
        return allowText
          ? `<div class="cover-23 flex items-center justify-center px-3 text-center"><span class="text-[11px] font-semibold leading-snug text-ddg/40">${escapeHtml(book.title)}</span></div>`
          : `<div class="book-empty"></div>`;
      }

      function compressImageFile(file) {
        return new Promise((resolve) => {
          if (!file.type.match(/^image\//)) return resolve(null);
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(url);
            const ratio = IMG_MAX / Math.max(img.width, img.height);
            const scale = ratio >= 1 ? 1 : ratio;
            const cw = Math.round(img.width * scale);
            const ch = Math.round(img.height * scale);
            const c = document.createElement("canvas");
            c.width = cw;
            c.height = ch;
            c.getContext("2d").drawImage(img, 0, 0, cw, ch);
            try {
              resolve(c.toDataURL("image/jpeg", JPEG_Q));
            } catch {
              resolve(null);
            }
          };
          img.onerror = () => {
            URL.revokeObjectURL(url);
            resolve(null);
          };
          img.src = url;
        });
      }
      async function readCoverFromForm(form, book) {
        const fi = form.elements.namedItem("coverFile");
        const ui = form.elements.namedItem("coverUrl");
        const urlStr = ui && ui.value ? ui.value.trim() : "";
        if (fi && fi.files && fi.files[0]) {
          const d = await compressImageFile(fi.files[0]);
          if (d) book.coverUrl = d;
          else if (urlStr) book.coverUrl = urlStr;
        } else if (urlStr) {
          book.coverUrl = urlStr;
        }
      }

      async function persistBook(book) {
        const { error } = await sb.from("books").upsert(bookToRow(book), { onConflict: "id" });
        if (error) throw error;
      }
      async function refreshFromDb() {
        const { data: rows, error: e1 } = await sb.from("books").select("*");
        if (e1) throw e1;
        const bookRows = sortBooksRows(rows);
        const { data: mrows, error: e2 } = await sb.from("meetings").select("*").order("created_at", { ascending: true });
        if (e2) throw e2;
        if (!bookRows || !bookRows.length) {
          const batch = [];
          for (let i = 1; i <= BOOK_TOTAL; i++) {
            batch.push({
              id: "b" + i,
              title: "2026 독서 " + i,
              author: "",
              milestones: emptyMilestonesPayload(4),
              cover_url: null,
              final_sentence: null,
              final_at: null,
            });
          }
          const { error: e3 } = await sb.from("books").insert(batch);
          if (e3 && !String(e3.message || "").includes("duplicate")) throw e3;
          return refreshFromDb();
        }
        cache = {
          books: bookRows.map((r, i) => normalizeBook(r, i)),
          meetingRecords: (mrows || []).map((r) => ({
            id: r.id,
            bookId: r.book_id,
            date: r.meeting_date,
            place: r.place,
            photos: Array.isArray(r.photos) ? r.photos : [],
            createdAt: r.created_at,
          })),
        };
        loadError = null;
      }
      function scheduleRefresh() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
          try {
            await refreshFromDb();
            renderApp();
          } catch (e) {
            loadError = e.message || String(e);
            renderApp();
          }
        }, 130);
      }
      function subscribeRealtime() {
        if (rtChannel) {
          sb.removeChannel(rtChannel);
          rtChannel = null;
        }
        rtChannel = sb
          .channel("bookvibe-public")
          .on("postgres_changes", { event: "*", schema: "public", table: "books" }, scheduleRefresh)
          .on("postgres_changes", { event: "*", schema: "public", table: "meetings" }, scheduleRefresh)
          .subscribe();
      }
      function parseRoute() {
        const h = (location.hash || "").replace(/^#\/?/, "");
        if (h.indexOf("shelf") === 0) return { main: "shelf", overlay: null };
        if (h.indexOf("meetings") === 0) return { main: "meetings", overlay: null };
        if (h.indexOf("recap") === 0) return { main: "recap", overlay: null };
        const m = h.match(/^book\/([^/]+)/);
        if (m) return { main: "feed", overlay: "book:" + m[1] };
        return { main: "feed", overlay: null };
      }
      function goHash(h) {
        location.hash = h;
      }

      function renderTop(data) {
        const progress = overallProgress(data);
        const doneBooks = data.books.filter((b) => bookStatus(b) === "기록 완료").length;
        const err = loadError ? `<p class="mt-2 text-xs text-red-700">연결 오류: ${escapeHtml(loadError)}</p>` : "";
        return `<header class="sticky top-0 z-30 border-b border-ddg/8 bg-page/95 backdrop-blur-md"><div class="mx-auto max-w-content px-4 pb-4 pt-6"><div class="flex items-end justify-between gap-2"><div><p class="text-[10px] font-semibold uppercase tracking-[0.22em] text-gold/90">Reading Club</p><h1 class="mt-1 text-2xl font-bold tracking-tight text-ddg">BookVibe 2026</h1></div><p class="text-xs text-ddg/50">${doneBooks}/${BOOK_TOTAL}권 완료</p></div>${err}<div class="mt-4"><div class="mb-2 flex justify-between text-[11px] font-medium text-ddg/60"><span>전체 챕터 진행률</span><span>${progress.done}/${progress.total} 챕터</span></div><div class="h-2 overflow-hidden rounded-full bg-mist"><div class="progress-fill h-full rounded-full bg-gradient-to-r from-ddg-mid to-ddg" style="width:${progress.pct}%"></div></div></div></div></header>`;
      }

      function renderTrack(book) {
        if (!book) return "";
        const lanes = CLUB_MEMBERS.map((m) => {
          const pct = memberProgress(book, m.id);
          return `<div class="mt-3"><div class="mb-1.5 flex items-center justify-between text-xs"><span class="font-semibold">${escapeHtml(m.name)}</span><span class="text-ddg/50">${pct}%</span></div><div class="track-lane"><div class="runner" style="left:${Math.max(5, Math.min(95, pct))}%;background:${m.color}">${escapeHtml(m.short)}</div></div></div>`;
        }).join("");
        return `<section class="rounded-2xl border border-ddg/10 bg-white/80 p-4"><p class="text-[11px] font-semibold uppercase tracking-[0.18em] text-gold">지금 우리 어디쯤?</p><h2 class="mt-1 text-lg font-bold">${escapeHtml(book.title)}</h2><p class="text-xs text-ddg/50">${chapterFilledCount(book)} / ${chapterKeys(book).length} 챕터 완료</p>${lanes}</section>`;
      }
      function memberDots(book) {
        return `<div class="mt-2 flex items-center gap-1">${CLUB_MEMBERS.map((m) => `<span class="member-dot ${memberHasAny(book, m.id) ? "" : "opacity-30"}" style="background:${m.color}" title="${escapeHtml(m.name)}"></span>`).join("")}</div>`;
      }
      function renderFeed(data) {
        const focus = currentBook(data);
        const cards = data.books
          .slice()
          .sort((a, b) => {
            const pa = bookStatus(a) === "문장 수집 중" ? 0 : bookStatus(a) === "대기" ? 1 : 2;
            const pb = bookStatus(b) === "문장 수집 중" ? 0 : bookStatus(b) === "대기" ? 1 : 2;
            return pa - pb || bookIdSortIndex(a.id) - bookIdSortIndex(b.id);
          })
          .map((b) => {
            const st = bookStatus(b);
            const p = chapterKeys(b).length ? Math.round((chapterFilledCount(b) / chapterKeys(b).length) * 100) : 0;
            return `<a href="#/book/${b.id}" class="block rounded-2xl border border-ddg/10 bg-white p-3">${coverHtml(b)}<div class="mt-3 flex items-start justify-between gap-2"><div class="min-w-0"><p class="truncate text-[15px] font-semibold text-ddg">${escapeHtml(b.title)}</p><p class="truncate text-xs text-ddg/45">${escapeHtml(memberStatusText(b))}</p>${memberDots(b)}</div><span class="status-pill shrink-0 rounded-full border px-2 py-1 text-[10px] font-semibold ${statusClass(st)}">${st}</span></div><div class="mt-3 h-1.5 overflow-hidden rounded-full bg-mist"><div class="progress-fill h-full rounded-full bg-ddg-mid" style="width:${p}%"></div></div></a>`;
          })
          .join("");
        return `<main class="mx-auto max-w-content px-4 py-6 pb-32"><section>${renderTrack(focus)}</section><section class="mt-4 grid grid-cols-2 gap-3">${cards}</section></main>`;
      }

      function renderShelf(data) {
        const rowSize = 2;
        const rows = [];
        for (let i = 0; i < data.books.length; i += rowSize) rows.push(data.books.slice(i, i + rowSize));
        const rowHtml = rows
          .map((row) => {
            const cells = row
              .map((b) => `<a href="#/book/${b.id}" class="book-slot block">${b.coverUrl ? coverHtml(b, false) : `<div class="book-empty"></div>`}</a>`)
              .join("");
            return `<div class="shelf-row p-3"><div class="grid grid-cols-2 gap-3">${cells}</div></div>`;
          })
          .join("");
        return `<main class="wood-bg relative mx-auto min-h-[calc(100vh-172px)] max-w-content px-4 py-6 pb-32"><div class="relative z-10"><h2 class="text-center font-serif text-xl text-[#f4e6c2]">Mira, Chad, Chloe의 2026 서재</h2><p class="mt-1 text-center text-[11px] text-[#f4e6c2]/70">표지를 탭하면 상세 정보가 열립니다</p><div class="mt-5 space-y-3">${rowHtml}</div></div></main>`;
      }
      function sortedMeetings(data) {
        return data.meetingRecords.slice().sort((a, b) => ((a.date || "") + (a.createdAt || "")).localeCompare((b.date || "") + (b.createdAt || "")));
      }
      function meetingsForBook(data, bookId) {
        return data.meetingRecords.filter((m) => m.bookId === bookId);
      }
      function renderMeetings(data) {
        const list = sortedMeetings(data);
        const titleOf = (id) => data.books.find((x) => x.id === id)?.title || "—";
        const body = list.length
          ? list
              .map((rec) => {
                const ph = (rec.photos || [])
                  .map((src) => `<div class="aspect-square overflow-hidden rounded-lg border border-ddg/8 bg-mist"><img src="${escapeHtml(src)}" class="h-full w-full object-cover" alt="" loading="lazy" /></div>`)
                  .join("");
                return `<article class="border-b border-ddg/8 py-8 last:border-0"><p class="text-xs font-medium text-ddg/40">${escapeHtml(rec.date || "")}</p><h2 class="mt-1 text-lg font-bold text-ddg">${escapeHtml(titleOf(rec.bookId))}</h2><p class="mt-1 text-sm text-ddg/55">📍 ${escapeHtml(rec.place || "")}</p><div class="mt-4 grid grid-cols-3 gap-2">${ph}</div></article>`;
              })
              .join("")
          : `<p class="py-20 text-center text-sm text-ddg/45">모임 기록이 없습니다.</p>`;
        return `<main class="mx-auto max-w-content px-4 py-6 pb-32">${body}</main>`;
      }
      function renderRecap(data) {
        const rows = data.books
          .map((b, i) => `<div class="flex gap-4 border-b border-ddg/8 py-5 last:border-0"><div class="h-20 w-14 shrink-0">${coverHtml(b, true)}</div><div class="min-w-0 flex-1"><p class="text-[10px] font-semibold text-gold/80">#${i + 1}</p><h3 class="font-semibold text-ddg">${escapeHtml(b.title)}</h3><p class="mt-1 text-sm text-ddg/65">${b.finalSentence ? `「${escapeHtml(b.finalSentence)}」` : `<span class="text-ddg/30">—</span>`}</p></div></div>`)
          .join("");
        return `<main class="mx-auto max-w-content px-4 py-6 pb-32"><h2 class="text-lg font-bold">올해의 문장</h2><div class="mt-3">${rows}</div></main>`;
      }

      function quarterEditors(book, chapterNo) {
        const mq = book.milestones[chapterNo] || emptyQuarter();
        return CLUB_MEMBERS.map((mem) => `<div class="mt-3"><label class="text-xs font-semibold text-ddg/50">${escapeHtml(mem.name)}</label><textarea name="c${chapterNo}_${mem.id}" rows="2" class="field mt-1 resize-y" placeholder="이 챕터에서 기억에 남는 문장">${escapeHtml((mq[mem.id] || "").replace(/\r/g, ""))}</textarea></div>`).join("");
      }
      function meetingSection(data, book) {
        if (bookStatus(book) !== "기록 완료") return "";
        const ms = meetingsForBook(data, book.id);
        const list = ms
          .map((m) => `<li class="flex items-center justify-between gap-2 rounded-lg border border-ddg/8 bg-mist/40 px-3 py-2 text-xs"><span>${escapeHtml(m.date)} · ${escapeHtml(m.place)}</span><button type="button" class="text-rose-700/90 hover:underline" data-del-meeting="${m.id}">삭제</button></li>`)
          .join("");
        return `<section class="mt-8 border-t border-ddg/10 pt-8"><h3 class="text-sm font-bold text-ddg">Meeting History</h3><form id="form-meeting" class="mt-4 grid gap-3 sm:grid-cols-2" data-book="${book.id}"><div><label class="text-xs text-ddg/45">날짜</label><input type="date" name="mdate" required class="field mt-1" /></div><div><label class="text-xs text-ddg/45">장소</label><input name="mplace" required class="field mt-1" /></div><div class="sm:col-span-2"><label class="text-xs text-ddg/45">사진</label><input type="file" name="mphotos" accept="image/*" multiple class="mt-2 block w-full text-xs" /></div><div class="sm:col-span-2"><label class="text-xs text-ddg/45">사진 URL (줄바꿈)</label><textarea name="murls" rows="2" class="field mt-1"></textarea></div><div class="sm:col-span-2"><button type="submit" class="btn-ghost">기록 추가</button></div></form>${ms.length ? `<ul class="mt-4 space-y-2">${list}</ul>` : ""}</section>`;
      }
      function renderBookModal(data, book) {
        const st = bookStatus(book);
        const chapterForms = chapterKeys(book)
          .map((ch) => `<section class="mt-7 border-t border-ddg/10 pt-6 first:mt-5 first:border-0 first:pt-0"><h3 class="text-xs font-bold uppercase tracking-wider text-gold/90">Chapter ${ch} / ${book.chapters}</h3><form id="form-chapter-${ch}" class="mt-2" data-book="${book.id}" data-chapter="${ch}">${quarterEditors(book, ch)}<button type="submit" class="btn-primary mt-3 w-full">이 챕터 저장</button></form></section>`)
          .join("");
        const chapterAdmin = isAdminMode
          ? `<section class="mt-6 rounded-xl border border-ddg/10 bg-white/80 p-3"><p class="text-xs font-semibold text-ddg">관리자 모드: 챕터 관리</p><p class="mt-1 text-[11px] text-ddg/55">현재 ${book.chapters}개 챕터</p><div class="mt-3 flex gap-2"><button type="button" class="btn-ghost flex-1" data-admin-action="chapter-add" data-book="${book.id}">챕터 추가</button><button type="button" class="btn-ghost flex-1" data-admin-action="chapter-remove" data-book="${book.id}">챕터 삭제</button></div></section>`
          : "";
        const finalBlock = allChaptersComplete(book)
          ? `<form id="form-final" class="mt-7 space-y-2 border-t border-ddg/10 pt-6" data-book="${book.id}"><label class="text-sm font-bold text-ddg">최종 1문장 확정</label><textarea name="final" rows="3" class="field mt-1" placeholder="이 책을 대표하는 한 문장">${escapeHtml((book.finalSentence || "").replace(/\r/g, ""))}</textarea><button type="submit" class="btn-primary w-full">확정 저장</button></form>`
          : `<p class="mt-7 border-t border-ddg/10 pt-6 text-sm text-ddg/45">모든 챕터가 채워지면 최종 문장 확정이 열립니다.</p>`;
        return `<div class="modal-backdrop fixed inset-0 z-50 flex items-end justify-center sm:items-center sm:p-6"><div class="paper max-h-[92vh] w-full max-w-lg overflow-y-auto rounded-t-2xl p-6 shadow-2xl sm:max-h-[88vh] sm:rounded-2xl"><div class="sticky top-0 z-10 -mx-6 -mt-6 mb-4 flex items-center justify-between border-b border-ddg/10 bg-[#f8f1e3]/95 px-6 py-4 backdrop-blur"><a href="#/" class="text-sm text-ddg/45">닫기</a><div class="flex items-center gap-2"><button type="button" class="btn-ghost !px-3 !py-1.5 !text-xs" data-admin-toggle="1">${isAdminMode ? "관리자 해제" : "관리자 모드"}</button><span class="status-pill rounded-full border px-3 py-1 text-[10px] font-bold ${statusClass(st)}">${st}</span></div></div><div class="mx-auto max-w-[190px]">${coverHtml(book)}</div><form id="form-meta" class="mt-5 space-y-3" data-book="${book.id}"><div><label class="text-xs font-medium text-ddg/45">제목</label><input name="title" class="field mt-1" value="${escapeHtml(book.title)}" /></div><div><label class="text-xs font-medium text-ddg/45">저자</label><input name="author" class="field mt-1" value="${escapeHtml(book.author)}" /></div><div><label class="text-xs font-medium text-ddg/45">표지</label><input type="file" name="coverFile" accept="image/*" class="mt-2 block text-xs" /><input type="url" name="coverUrl" class="field mt-2" placeholder="URL" value="${book.coverUrl && book.coverUrl.indexOf("http") === 0 ? escapeHtml(book.coverUrl) : ""}" /></div><button type="submit" class="btn-primary w-full">정보 저장</button></form>${chapterAdmin}${chapterForms}${finalBlock}${meetingSection(data, book)}</div></div>`;
      }
      function renderBottomNav(r) {
        const a = "flex flex-1 flex-col items-center justify-center py-3 text-center text-[11px] font-semibold transition ";
        return `<nav class="fixed bottom-0 left-0 right-0 z-40 border-t border-ddg/10 bg-page/95 backdrop-blur-md"><div class="mx-auto flex max-w-content"><a href="#/" class="${a}${r.main === "feed" && !r.overlay ? "text-ddg" : "text-ddg/40"}">진행 중</a><a href="#/shelf" class="${a}${r.main === "shelf" ? "text-ddg" : "text-ddg/40"}">디지털 북쉘프</a><a href="#/meetings" class="${a}${r.main === "meetings" ? "text-ddg" : "text-ddg/40"}">모임</a><a href="#/recap" class="${a}${r.main === "recap" ? "text-ddg" : "text-ddg/40"}">올해의 문장</a></div></nav>`;
      }
      function renderOverlay(data, r) {
        if (r.overlay && r.overlay.startsWith("book:")) {
          const id = r.overlay.slice(5);
          const b = data.books.find((x) => x.id === id);
          if (b) return renderBookModal(data, b);
        }
        return "";
      }
      function renderApp() {
        const root = document.getElementById("app-root");
        if (!root) return;
        if (!cache) {
          root.innerHTML = `<div class="flex min-h-screen items-center justify-center text-sm text-ddg/50">불러오는 중…</div>`;
          return;
        }
        const r = parseRoute();
        const main = r.main === "meetings" ? renderMeetings(cache) : r.main === "recap" ? renderRecap(cache) : r.main === "shelf" ? renderShelf(cache) : renderFeed(cache);
        root.innerHTML = `<div class="min-h-screen pb-28">${renderTop(cache)}${main}${renderBottomNav(r)}<div id="overlay-root">${renderOverlay(cache, r)}</div></div>`;
        if (!location.hash || location.hash === "#") history.replaceState(null, "", "#/");
      }
      function fireConfetti() {
        const canvas = document.getElementById("confetti-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = (canvas.width = window.innerWidth);
        const h = (canvas.height = window.innerHeight);
        const pieces = [];
        for (let i = 0; i < 48; i++) pieces.push({ x: Math.random() * w, y: -20 - Math.random() * 80, r: 3 + Math.random() * 5, vy: 2 + Math.random() * 4, vx: (Math.random() - 0.5) * 2, rot: Math.random() * 6, vr: (Math.random() - 0.5) * 0.15, c: ["#c4a35a", "#153528", "#d4b76a", "#0c1f18"][Math.floor(Math.random() * 4)] });
        const t0 = Date.now();
        function frame() {
          const elapsed = Date.now() - t0;
          ctx.clearRect(0, 0, w, h);
          pieces.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.c;
            ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
            ctx.restore();
          });
          if (elapsed < 2200) requestAnimationFrame(frame);
          else ctx.clearRect(0, 0, w, h);
        }
        frame();
      }
      function maybeCelebrate(oldS, newS) {
        if (oldS !== "기록 완료" && newS === "기록 완료") fireConfetti();
      }
      async function handleAdminAction(action, bookId) {
        if (!cache) return;
        const book = cache.books.find((b) => b.id === bookId);
        if (!book) return;
        if (action === "chapter-add") {
          book.chapters += 1;
          book.milestones[book.chapters] = emptyQuarter();
          await persistBook(book);
          await refreshFromDb();
          renderApp();
          return;
        }
        if (action === "chapter-remove") {
          if (book.chapters <= 1) return alert("최소 1개 챕터는 유지해야 합니다.");
          const last = book.milestones[book.chapters] || emptyQuarter();
          const hasInput = CLUB_MEMBERS.some((m) => (last[m.id] || "").trim());
          if (hasInput) return alert("마지막 챕터에 입력이 있어 삭제할 수 없습니다.");
          delete book.milestones[book.chapters];
          book.chapters -= 1;
          if (book.finalSentence && !allChaptersComplete(book)) {
            book.finalSentence = null;
            book.finalAt = null;
          }
          await persistBook(book);
          await refreshFromDb();
          renderApp();
        }
      }
      function bindGlobals() {
        document.addEventListener("click", (e) => {
          const t = e.target;
          if (t.classList && t.classList.contains("modal-backdrop")) goHash("#/");
          const dm = t.closest && t.closest("[data-del-meeting]");
          if (dm) {
            const mid = dm.getAttribute("data-del-meeting");
            (async () => {
              try {
                const { error } = await sb.from("meetings").delete().eq("id", mid);
                if (error) throw error;
                await refreshFromDb();
                renderApp();
              } catch (err) {
                alert(err.message || String(err));
              }
            })();
            return;
          }
          const adminToggle = t.closest && t.closest("[data-admin-toggle]");
          if (adminToggle) {
            if (!isAdminMode) {
              const input = prompt("관리자 비밀번호를 입력하세요:");
              if (input !== ACCESS_PASSWORD) return alert("비밀번호가 올바르지 않습니다.");
            }
            isAdminMode = !isAdminMode;
            renderApp();
            return;
          }
          const adminAction = t.closest && t.closest("[data-admin-action]");
          if (adminAction) {
            handleAdminAction(adminAction.getAttribute("data-admin-action"), adminAction.getAttribute("data-book")).catch((err) => alert(err.message || String(err)));
          }
        });

        document.addEventListener("submit", async (e) => {
          const form = e.target;
          if (form.tagName !== "FORM") return;
          e.preventDefault();
          if (!cache) return;
          try {
            if (form.id === "form-meta") {
              const bid = form.getAttribute("data-book");
              const b = cache.books.find((x) => x.id === bid);
              if (!b) return;
              const old = bookStatus(b);
              b.title = form.elements.namedItem("title").value.trim() || b.title;
              b.author = (form.elements.namedItem("author")?.value || "").trim();
              await readCoverFromForm(form, b);
              await persistBook(b);
              await refreshFromDb();
              maybeCelebrate(old, bookStatus(b));
              renderApp();
              return;
            }
            if (form.id && form.id.startsWith("form-chapter-")) {
              const chapter = parseInt(form.getAttribute("data-chapter"), 10);
              const bid = form.getAttribute("data-book");
              const b = cache.books.find((x) => x.id === bid);
              if (!b || !chapterKeys(b).includes(chapter)) return;
              const old = bookStatus(b);
              const seg = b.milestones[chapter] || emptyQuarter();
              CLUB_MEMBERS.forEach((m) => {
                const el = form.elements.namedItem(`c${chapter}_${m.id}`);
                seg[m.id] = el && el.value ? el.value : "";
              });
              b.milestones[chapter] = seg;
              await persistBook(b);
              await refreshFromDb();
              maybeCelebrate(old, bookStatus(b));
              renderApp();
              return;
            }
            if (form.id === "form-final") {
              const bid = form.getAttribute("data-book");
              const b = cache.books.find((x) => x.id === bid);
              if (!b || !allChaptersComplete(b)) return;
              const old = bookStatus(b);
              b.finalSentence = form.elements.namedItem("final").value.trim() || null;
              b.finalAt = b.finalSentence ? new Date().toISOString() : null;
              await persistBook(b);
              await refreshFromDb();
              maybeCelebrate(old, bookStatus(b));
              renderApp();
              return;
            }
            if (form.id === "form-meeting") {
              const bid = form.getAttribute("data-book");
              const b = cache.books.find((x) => x.id === bid);
              if (!b || bookStatus(b) !== "기록 완료") return;
              const mdate = form.elements.namedItem("mdate").value;
              const mplace = form.elements.namedItem("mplace").value.trim();
              if (!mdate || !mplace) return;
              const photos = [];
              const ut = (form.elements.namedItem("murls")?.value || "").trim();
              if (ut) ut.split(/\n+/).forEach((line) => line.trim().indexOf("http") === 0 && photos.push(line.trim()));
              const files = form.elements.namedItem("mphotos")?.files?.length ? Array.from(form.elements.namedItem("mphotos").files) : [];
              for (const file of files) {
                const d = await compressImageFile(file);
                if (d) photos.push(d);
              }
              const { error } = await sb.from("meetings").insert({ book_id: bid, meeting_date: mdate, place: mplace, photos });
              if (error) throw error;
              await refreshFromDb();
              renderApp();
              return;
            }
          } catch (err) {
            alert(err.message || String(err));
          }
        });
      }

      window.addEventListener("hashchange", () => renderApp());
      window.addEventListener("resize", () => {
        const c = document.getElementById("confetti-canvas");
        if (c) {
          c.width = window.innerWidth;
          c.height = window.innerHeight;
        }
      });
      document.addEventListener("DOMContentLoaded", async () => {
        if (sessionStorage.getItem("isAuthorized") !== "true") return;
        try {
          await refreshFromDb();
          subscribeRealtime();
          bindGlobals();
          renderApp();
        } catch (err) {
          loadError = err.message || String(err);
          cache = { books: [], meetingRecords: [] };
          bindGlobals();
          renderApp();
        }
      });
    </script>
  </body>
</html>
